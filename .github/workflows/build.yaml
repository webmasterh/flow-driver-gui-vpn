name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'

    - name: Install dependencies
      run: |
        # Ensure we have the latest Go modules
        go mod tidy
        go mod download
        
        # If you need specific Windows dependencies, add them here
        # Example for common packages:
        # go get github.com/your/package

    - name: Build Windows GUI executable
      run: |
        # Use the default MinGW toolchain that comes with Go on Windows
        go build -ldflags="-H windowsgui -s -w" -o flow-driver-gui.exe

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        draft: false
        prerelease: false

    - name: Upload Release Asset
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./flow-driver-gui.exe
        asset_name: flow-driver-gui-windows-amd64.exe
        asset_content_type: application/octet-stream

    - name: Verify build
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        # Show file information to verify successful build
        Get-ChildItem -Path .\flow-driver-gui.exe -Force
