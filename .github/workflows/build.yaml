name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'

    - name: Install dependencies
      run: |
        # Ensure we have the latest Go modules
        go mod tidy
        go mod download
        
        # If you need specific Windows dependencies, add them here
        # Example for common packages:
        # go get github.com/your/package

    - name: Build Windows GUI executable
      run: |
        VERSION=${github.ref_name}
        FILE_NAME="flow-driver-${VERSION}-windows.exe"
        go build -ldflags="-H windowsgui -s -w" -o $FILE_NAME

    - name: Release
      uses: softprops/action-gh-release@v1
      with:
        files: flow-driver-*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Verify build
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        # Show file information to verify successful build
        Get-ChildItem -Path .\flow-driver-gui.exe -Force
