name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'

    - name: Install dependencies
      run: |
        # Ensure we have the latest Go modules
        go mod tidy
        go mod download
        
        # If you need specific Windows dependencies, add them here
        # Example for common packages:
        # go get github.com/your/package

    - name: Build Windows GUI executable
      run: |
        VERSION=${GITHUB_REF_NAME}
        FOLDER_NAME="flow-driver-gui-${VERSION}"
        mkdir -p $FOLDER_NAME
        go build -ldflags="-H windowsgui -s -w" -o $FOLDER_NAME/flow-driver-gui.exe

        zip -r "${FOLDER_NAME}.zip" $FOLDER_NAME
    - name: Release
      uses: softprops/action-gh-release@v1
      with:
        files: flow-driver-*.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
