name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      
      - name: Install dependencies
        run: |
          go mod tidy
          go mod download
      
      - name: Build Windows
        run: |
          $VERSION = "${{ github.ref_name }}"
          $FOLDER_NAME = "flow-driver-$VERSION-windows"
          New-Item -ItemType Directory -Path $FOLDER_NAME
          go build -ldflags="-H windowsgui -s -w" -o $FOLDER_NAME/flow-driver-gui.exe
          Copy-Item -Recurse ./dist/client $FOLDER_NAME/
          Compress-Archive -Path $FOLDER_NAME/* -DestinationPath "$FOLDER_NAME.zip"
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: flow-driver-*.zip

